<!DOCTYPE html>
<html>
<body>

<h2>Add Student</h2>

<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll">
<input id="branch" placeholder="Branch">
<input id="marks" placeholder="Marks">
<button onclick="add()">Add</button>

<h2>Students</h2>
<ul id="list"></ul>

<script>
const API = "/api/students";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(s => {
    list.innerHTML += `
      <li>
        ${s.name} (${s.rollNumber})
        <button onclick="del('${s._id}')">X</button>
      </li>`;
  });
}

async function add() {
  await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name.value,
      rollNumber: roll.value,
      branch: branch.value,
      marks: marks.value
    })
  });
  load();
}

async function del(id) {
  await fetch(API + "/" + id, { method: "DELETE" });
  load();
}

load();
</script>

</body>
</html>
